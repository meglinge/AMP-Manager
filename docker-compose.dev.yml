services:
  postgres:
    image: postgres:16-alpine
    container_name: ampmanager-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: ampmanager
    volumes:
      - ampmanager_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ampmanager"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  ampmanager_postgres_data:
