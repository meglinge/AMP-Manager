services:
  ampmanager:
    image: ghcr.io/meglinge/amp-manager:latest
    container_name: ampmanager
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "16823:16823"
    volumes:
      - ./data:/app/data
    environment:
      - SERVER_PORT=16823
      - DB_TYPE=${DB_TYPE:-sqlite}
      - SQLITE_PATH=${SQLITE_PATH:-/app/data/data.db}
      - DATABASE_URL=${DATABASE_URL:-postgres://postgres:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-ampmanager}?sslmode=disable}
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-in-production}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}

  postgres:
    image: postgres:16-alpine
    container_name: ampmanager-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change-me}
      - POSTGRES_DB=${POSTGRES_DB:-ampmanager}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ampmanager}"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
